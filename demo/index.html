<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sales Agent — Chat Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --user-bubble: #4f46e5;
      --assistant-bubble: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 12px;

      --intent-product: #2563eb;
      --intent-support: #059669;
      --intent-purchase: #d97706;
      --intent-negotiation: #7c3aed;
      --intent-general: #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(79,70,229,.3);
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header .subtitle { font-size: .8rem; opacity: .75; margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .session-pill {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .72rem;
      font-family: monospace;
    }
    .nav-link {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: .82rem;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 8px;
      transition: background .15s;
    }
    .nav-link:hover { background: rgba(255,255,255,.15); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar h3 {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .preset-btn {
      width: 100%;
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .82rem;
      cursor: pointer;
      color: var(--text);
      transition: background .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }
    .preset-btn:hover { background: #e0e7ff; border-color: var(--primary); color: var(--primary); }
    .preset-btn .icon { font-size: 1rem; flex-shrink: 0; }

    .intent-legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: .78rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat main ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Message rows ── */
    .msg-row { display: flex; gap: 10px; max-width: 780px; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .msg-row.user .avatar { background: var(--primary); }
    .msg-row.assistant .avatar { background: #e0e7ff; }

    .msg-body { display: flex; flex-direction: column; gap: 6px; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .9rem;
      line-height: 1.55;
      max-width: 560px;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .bubble {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .msg-row.user .msg-meta { justify-content: flex-end; }

    .timestamp { font-size: .7rem; color: var(--text-muted); }

    /* ── Intent badge ── */
    .intent-badge {
      font-size: .66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
    }
    .intent-PRODUCT_SEARCH  { background: var(--intent-product); }
    .intent-SUPPORT_QUESTION{ background: var(--intent-support); }
    .intent-PURCHASE_INTENT { background: var(--intent-purchase); }
    .intent-NEGOTIATION     { background: var(--intent-negotiation); }
    .intent-GENERAL_CHAT    { background: var(--intent-general); }

    /* ── Source attribution ── */
    .source-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .source-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: #dcfce7; color: #166534;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: .72rem;
      font-weight: 500;
    }

    /* ── Product cards ── */
    .product-cards {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-top: 4px;
    }
    .product-cards::-webkit-scrollbar { height: 4px; }
    .product-cards::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 170px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: transform .15s, box-shadow .15s;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

    .product-img {
      width: 100%; height: 120px;
      object-fit: cover;
      background: #e0e7ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      color: #a5b4fc;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }

    .product-info { padding: 10px; }
    .product-title { font-size: .8rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
    .product-price { font-size: .9rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .stock-label {
      display: inline-block;
      font-size: .68rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .stock-in     { background: #dcfce7; color: #166534; }
    .stock-low    { background: #fef3c7; color: #92400e; }
    .stock-out    { background: #fee2e2; color: #991b1b; }

    .variant-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .variant-pill {
      font-size: .65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--text-muted);
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .typing-dot {
      width: 8px; height: 8px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      color: var(--text);
    }
    .input-area input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .input-area button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .input-area button:hover { background: var(--primary-dark); }
    .input-area button:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div>🤖</div>
  <div>
    <h1>AI Sales Agent</h1>
    <div class="subtitle">Sprint 2 Demo — Semantic Search &amp; Conversational Support</div>
  </div>
  <div class="header-right">
    <span class="session-pill" id="sessionPill">No session</span>
    <a class="nav-link" href="/demo/admin.html">Admin Panel →</a>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">


    <div>
      <h3>Intents</h3>
      <div class="intent-legend">
        <div class="legend-row"><div class="legend-dot" style="background:var(--intent-product)"></div> Product Search</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--intent-support)"></div> Support Question</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--intent-purchase)"></div> Purchase Intent</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--intent-general)"></div> General Chat</div>
      </div>
    </div>
  </aside>

  <!-- ── Chat main ── -->
  <main class="chat-main">
    <div class="messages" id="messages">
      <!-- Welcome message -->
    </div>
    <div class="input-area">
      <input
        type="text"
        id="msgInput"
        placeholder="Type a message and press Enter…"
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </main>
</div>

<script>
  const API = '';   // same origin — served by Express at /demo/
  const LS_KEY = 'agent_guest_token';

  let guestToken = localStorage.getItem(LS_KEY) || null;
  updateSessionPill();

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');

  // ── Render welcome bubble on load ──────────────────────────────────────────
  appendAssistantMessage(
    "Hi! I'm your AI sales assistant. I can help you find products, answer support questions, and more. What are you looking for today?",
    'GENERAL_CHAT',
    [], []
  );

  // ── Send on Enter ──────────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendPreset(text) {
    inputEl.value = text;
    sendMessage();
  }

  // ── Core send ──────────────────────────────────────────────────────────────
  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    setInputDisabled(true);
    appendUserMessage(message);
    const typingId = appendTyping();

    try {
      const body = { message };
      if (guestToken) body.guest_token = guestToken;

      const res  = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      removeTyping(typingId);

      if (!data.success) {
        appendAssistantMessage(`⚠️ Error: ${data.error}`, 'GENERAL_CHAT', [], []);
        return;
      }

      // Persist the guest token
      if (data.guest_token && data.guest_token !== guestToken) {
        guestToken = data.guest_token;
        localStorage.setItem(LS_KEY, guestToken);
        updateSessionPill();
      }

      appendAssistantMessage(
        data.answer  || '',
        data.intent  || 'GENERAL_CHAT',
        data.products || [],
        data.sources  || []
      );

    } catch (err) {
      removeTyping(typingId);
      appendAssistantMessage('⚠️ Could not reach the server. Is the backend running?', 'GENERAL_CHAT', [], []);
    } finally {
      setInputDisabled(false);
      inputEl.focus();
    }
  }

  // ── DOM helpers ────────────────────────────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">👤</div>
      <div class="msg-body">
        <div class="bubble">${escHtml(text)}</div>
        <div class="msg-meta">
          <span class="timestamp">${now()}</span>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendAssistantMessage(text, intent, products, sources) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';

    const intentHtml = intent
      ? `<span class="intent-badge intent-${intent}">${intentLabel(intent)}</span>` : '';

    const sourcesHtml = sources.length
      ? `<div class="source-list">${sources.map(s =>
          `<span class="source-tag">📄 ${escHtml(s)}</span>`).join('')}</div>` : '';

    const cardsHtml = products.length ? renderCards(products) : '';

    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="msg-body">
        ${text ? `<div class="bubble">${escHtml(text)}</div>` : ''}
        ${cardsHtml}
        <div class="msg-meta">
          <span class="timestamp">${now()}</span>
          ${intentHtml}
        </div>
        ${sourcesHtml}
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const id = 'typing-' + Date.now();
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = id;
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="msg-body">
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  function renderCards(products) {
    const cards = products.map(p => {
      const img = p.imageUrl
        ? `<div class="product-img"><img src="${p.imageUrl}" alt="${escHtml(p.title)}" loading="lazy" onerror="this.parentElement.innerHTML='🛍️'"/></div>`
        : `<div class="product-img">🛍️</div>`;

      const stockClass = p.stockLabel === 'In Stock' ? 'stock-in'
        : p.stockLabel === 'Out of Stock' ? 'stock-out' : 'stock-low';

      const variants = (p.variants || []).slice(0, 3).map(v =>
        `<span class="variant-pill">${escHtml(v.title)}</span>`).join('');

      return `
        <div class="product-card">
          ${img}
          <div class="product-info">
            <div class="product-title">${escHtml(p.title)}</div>
            <div class="product-price">$${parseFloat(p.price).toFixed(2)}</div>
            <span class="stock-label ${stockClass}">${escHtml(p.stockLabel)}</span>
            ${variants ? `<div class="variant-pills">${variants}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    return `<div class="product-cards">${cards}</div>`;
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function intentLabel(intent) {
    return {
      PRODUCT_SEARCH:   'Product Search',
      SUPPORT_QUESTION: 'Support',
      PURCHASE_INTENT:  'Purchase Intent',
      NEGOTIATION:      'Negotiation',
      GENERAL_CHAT:     'General Chat',
    }[intent] || intent;
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setInputDisabled(disabled) {
    inputEl.disabled  = disabled;
    sendBtn.disabled  = disabled;
  }

  function updateSessionPill() {
    const el = document.getElementById('sessionPill');
    el.textContent = guestToken
      ? `Session: ${guestToken.slice(0,8)}…`
      : 'No session';
  }
</script>
</body>
</html>
